<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>오브래쉬 AUBE | 제주 속눈썹 펌 &amp; 연장 전문</title>
    <meta name="description" content="제주 연동에 위치한 속눈썹 펌 &amp; LED 포인트 연장 전문샵 오브래쉬. 자연스러우면서도 확실히 다른 눈매를 경험하세요.">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Outfit:wght@300;400;500;600&family=Noto+Serif+KR:wght@300;400;500&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #faf6f0;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(243, 218, 203, 0.45) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(243, 218, 203, 0.3) 0%, transparent 50%);
            background-attachment: fixed;
            color: #4a423a;
            line-height: 1.8;
            letter-spacing: -0.01em;
            position: relative;
            min-height: 100vh;
        }

        /* Leaf shadow overlay */
        .leaf-shadow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" opacity="0.025" fill="%238e6d50"><path d="M150,0 C200,80 220,150 180,220 C150,270 90,300 30,320 C80,260 110,180 100,100 Z"/><path d="M300,50 C340,110 350,170 310,220 C280,260 220,280 170,290 C210,240 230,170 210,110 Z"/><path d="M50,150 C100,210 130,280 100,350 C70,400 10,420 -40,430 C10,370 30,290 10,220 Z"/></svg>');
            background-size: 400px 400px;
            background-repeat: no-repeat;
            pointer-events: none;
            z-index: 0;
        }

        header {
            background: #faf6f0;
            text-align: center;
            padding: 70px 20px 50px;
            border-bottom: 1px solid #e5d9cd;
            position: relative;
        }

        .lang-selector-top {
            position: absolute;
            top: 30px;
            right: 20px;
            display: flex;
            gap: 8px;
            z-index: 100;
        }

        .lang-btn {
            padding: 6px 14px;
            border: 1px solid #dcd5cc;
            background: rgba(255, 255, 255, 0.85);
            color: #8c7f72;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 400;
            font-family: 'Outfit', sans-serif;
            letter-spacing: 0.5px;
        }

        .lang-btn:hover {
            background: #faf6f0;
            color: #c48c65;
            border-color: #c48c65;
        }

        .lang-btn.active {
            background: #c48c65;
            color: #fff;
            border-color: #c48c65;
        }

        header .logo-container {
            margin-bottom: 30px;
        }

        header .logo-container img {
            width: 160px;
            height: auto;
            display: block;
            margin: 0 auto;
            mix-blend-mode: multiply;
            opacity: 0.95;
        }
        
        header .logo-container img:not([src]),
        header .logo-container img[src=""] {
            display: none;
        }
        header h1 {
            font-family: 'Cormorant Garamond', 'Noto Serif KR', serif;
            font-size: 2.2rem;
            font-weight: 300;
            color: #8e6d50;
            letter-spacing: 0.1em;
            margin-bottom: 15px;
        }

        header p {
            font-size: 1.02rem;
            color: #8c7f72;
            font-family: 'Outfit', 'Pretendard', sans-serif;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        nav {
            display: flex;
            justify-content: center;
            background: #faf6f0;
            border-bottom: 1px solid #e5d9cd;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        nav a {
            padding: 16px 25px;
            text-decoration: none;
            color: #7a6e62;
            font-weight: 400;
            font-size: 0.92rem;
            letter-spacing: 0.08em;
            font-family: 'Outfit', sans-serif;
            transition: color 0.3s;
            text-transform: uppercase;
        }

        nav a:hover {
            color: #c48c65;
        }

        section.hero {
            background-image: url('hero-bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #c48c65;
            min-height: 55vh;
            height: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid #e5d9cd;
        }
        
        section.hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(196, 140, 101, 0.3) 0%, rgba(176, 122, 84, 0.4) 100%);
            z-index: 0;
        }

        section.hero::after {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.15);
            z-index: 0;
        }

        section.hero h2 {
            font-size: 2.8rem;
            font-family: 'Cormorant Garamond', 'Noto Serif KR', serif;
            font-weight: 300;
            letter-spacing: 0.15em;
            z-index: 2;
            position: relative;
            text-align: center;
            padding: 0 20px;
        }

        section {
            padding: 90px 20px;
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        section h3 {
            font-family: 'Cormorant Garamond', 'Noto Serif KR', serif;
            font-size: 2rem;
            font-weight: 300;
            color: #8e6d50;
            margin-bottom: 40px;
            letter-spacing: 0.1em;
            text-align: center;
        }

        section p {
            font-size: 1rem;
            color: #5a5046;
            line-height: 1.8;
        }

        .intro-section {
            text-align: center;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 35px;
            margin: 50px 0;
        }

        .info-card {
            background: #ffffff;
            padding: 35px;
            border-radius: 8px;
            border: 1px solid #e5d9cd;
            position: relative;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .info-card::before {
            content: "";
            position: absolute;
            top: 6px;
            bottom: 6px;
            left: 6px;
            right: 6px;
            border: 1px solid #f2e9df;
            border-radius: 4px;
            pointer-events: none;
        }

        .info-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(142, 109, 80, 0.06);
        }

        .info-card h4 {
            font-family: 'Cormorant Garamond', 'Noto Serif KR', serif;
            font-size: 1.25rem;
            font-weight: 400;
            color: #8e6d50;
            letter-spacing: 0.05em;
            margin-bottom: 15px;
        }

        .info-card p {
            font-size: 0.95rem;
            color: #5a5046;
            margin: 0;
            line-height: 1.7;
        }

        /* ===== WeChat Section ===== */
        .wechat-section {
            background: #ffffff;
            border-radius: 8px;
            border: 1px solid #e5d9cd;
            padding: 50px 40px;
            margin-top: 10px;
            text-align: center;
            position: relative;
            box-shadow: 0 10px 30px rgba(46, 38, 32, 0.02);
        }

        .wechat-section::before {
            content: "";
            position: absolute;
            top: 8px;
            bottom: 8px;
            left: 8px;
            right: 8px;
            border: 1px solid #f2e9df;
            border-radius: 4px;
            pointer-events: none;
        }

        .wechat-section h3 {
            margin-bottom: 15px;
            position: relative;
            z-index: 2;
        }

        .wechat-section .wechat-desc {
            color: #8c7f72;
            font-size: 0.95rem;
            margin-bottom: 30px;
            position: relative;
            z-index: 2;
        }

        .wechat-qr-area {
            display: inline-block;
            margin: 10px 0 15px;
            position: relative;
            z-index: 2;
        }

        .wechat-qr-area img {
            width: 180px;
            height: 180px;
            display: block;
            border-radius: 4px;
            mix-blend-mode: multiply;
        }

        .social-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 25px;
            position: relative;
            z-index: 2;
        }

        .social-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 22px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 400;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid #e5d9cd;
            background: transparent;
            color: #8c7f72;
            font-family: 'Outfit', sans-serif;
            letter-spacing: 0.5px;
        }

        .social-btn.xiaohongshu:hover,
        .social-btn.instagram:hover {
            color: #c48c65;
            border-color: #c48c65;
            background: #faf6f0;
            transform: translateY(-1px);
            box-shadow: none;
        }

        /* ===== Notice Cards ===== */
        .notice-card {
            background: #ffffff;
            border-radius: 8px;
            padding: 35px;
            border: 1px solid #e5d9cd;
            margin-bottom: 25px;
            position: relative;
            box-shadow: 0 10px 30px rgba(46, 38, 32, 0.02);
        }

        .notice-card::before {
            content: "";
            position: absolute;
            top: 6px;
            bottom: 6px;
            left: 6px;
            right: 6px;
            border: 1px solid #f2e9df;
            border-radius: 4px;
            pointer-events: none;
        }

        .notice-card h4 {
            font-family: 'Cormorant Garamond', 'Noto Serif KR', serif;
            font-size: 1.25rem;
            font-weight: 400;
            color: #8e6d50;
            letter-spacing: 0.05em;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .notice-card .notice-icon {
            font-size: 1.2rem;
            display: inline-block;
        }

        .notice-card ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .notice-card ul li {
            padding: 8px 0;
            color: #5a5046;
            font-size: 0.95rem;
            position: relative;
            padding-left: 20px;
            line-height: 1.7;
        }

        .notice-card ul li::before {
            content: "✦";
            color: #c48c65;
            font-size: 0.7rem;
            position: absolute;
            left: 0;
            top: 10px;
        }

        .notice-card .multilang-text {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #e5d9cd;
        }

        .notice-card .multilang-text p {
            font-size: 0.9rem;
            color: #8c7f72;
            margin: 6px 0;
        }

        .notice-card .multilang-text .lang-label {
            display: inline-block;
            font-size: 0.75rem;
            color: #c48c65;
            font-weight: 600;
            width: 30px;
            text-align: right;
            margin-right: 8px;
        }

        footer {
            background: #faf6f0;
            padding: 50px 20px;
            text-align: center;
            font-size: 0.9rem;
            color: #8c7f72;
            border-top: 1px solid #e5d9cd;
        }

        footer p {
            margin: 6px 0;
        }

        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .lang-transition {
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .lang-transition.fade-out {
            opacity: 0;
            transform: translateY(-10px);
        }

        /* ===== Gemini Chatbot ===== */
        .chatbot-button {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: #ffffff;
            border: 1.5px solid #c48c65;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(142, 109, 80, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: #c48c65;
            transition: all 0.3s;
            z-index: 1000;
        }

        .chatbot-button:hover {
            background: #faf6f0;
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(142, 109, 80, 0.2);
        }

        .chatbot-window {
            position: fixed;
            bottom: 100px;
            right: 30px;
            width: 380px;
            height: 520px;
            background: #faf6f0;
            border: 1px solid #e5d9cd;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(142, 109, 80, 0.12);
            display: none;
            flex-direction: column;
            z-index: 1000;
            overflow: hidden;
        }

        .chatbot-window.open {
            display: flex;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chatbot-header {
            background: #c48c65;
            color: #fff;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chatbot-header h4 {
            margin: 0;
            font-size: 1.05rem;
            font-weight: 500;
            font-family: 'Cormorant Garamond', 'Noto Serif KR', serif;
            letter-spacing: 0.5px;
        }

        .chatbot-header .chatbot-subtitle {
            font-size: 0.75rem;
            opacity: 0.85;
            margin-top: 2px;
            font-family: 'Outfit', sans-serif;
        }

        .chatbot-close {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chatbot-lang-selector {
            display: flex;
            gap: 8px;
            padding: 10px 20px;
            background: #ffffff;
            border-bottom: 1px solid #e5d9cd;
        }

        .chatbot-lang-btn {
            padding: 5px 12px;
            border: 1px solid #dcd5cc;
            background: #fff;
            color: #8c7f72;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Outfit', sans-serif;
        }

        .chatbot-lang-btn.active {
            background: #c48c65;
            color: #fff;
            border-color: #c48c65;
        }

        .chatbot-messages {
            flex: 1;
            overflow-y: auto;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chatbot-message {
            max-width: 82%;
            padding: 11px 15px;
            border-radius: 8px;
            font-size: 0.88rem;
            line-height: 1.55;
            animation: fadeIn 0.3s ease-out;
            white-space: pre-wrap;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chatbot-message.bot {
            background: #ffffff;
            color: #4a423a;
            align-self: flex-start;
            border: 1px solid #e5d9cd;
        }

        .chatbot-message.user {
            background: #c48c65;
            color: #fff;
            align-self: flex-end;
        }

        .chatbot-message.typing {
            background: #ffffff;
            color: #8c7f72;
            align-self: flex-start;
            border: 1px solid #e5d9cd;
            font-style: italic;
        }

        .chatbot-quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .chatbot-quick-btn {
            padding: 6px 12px;
            background: #fff;
            border: 1px solid #dcd5cc;
            color: #8c7f72;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.78rem;
            transition: all 0.3s;
            font-family: 'Outfit', sans-serif;
        }

        .chatbot-quick-btn:hover {
            border-color: #c48c65;
            color: #c48c65;
            background: #faf6f0;
        }

        .chatbot-input-area {
            padding: 12px 16px;
            border-top: 1px solid #e5d9cd;
            background: #ffffff;
            display: flex;
            gap: 8px;
        }

        .chatbot-input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #dcd5cc;
            border-radius: 4px;
            font-size: 0.88rem;
            font-family: inherit;
        }

        .chatbot-input:focus {
            outline: none;
            border-color: #c48c65;
        }

        .chatbot-send {
            background: #c48c65;
            color: #fff;
            border: none;
            padding: 10px 18px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.88rem;
            font-weight: 500;
            transition: background 0.3s;
            font-family: 'Outfit', sans-serif;
        }

        .chatbot-send:hover {
            background: #8e6d50;
        }

        .chatbot-send:disabled {
            background: #d4c0b0;
            cursor: not-allowed;
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            header {
                padding: 50px 20px 40px;
            }

            .lang-selector-top {
                top: 15px;
                right: 15px;
                gap: 6px;
            }

            .lang-btn {
                padding: 6px 12px;
                font-size: 0.75rem;
            }

            header h1 {
                font-size: 1.8rem;
            }

            header .logo-container img {
                max-width: 150px;
            }

            section.hero h2 {
                font-size: 1.8rem;
                padding: 12px 25px;
            }

            .info-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            nav {
                flex-wrap: wrap;
            }

            nav a {
                padding: 12px 15px;
                font-size: 0.88rem;
            }

            .chatbot-window {
                width: calc(100vw - 30px);
                right: 15px;
                left: 15px;
                bottom: 90px;
                height: 65vh;
            }

            .chatbot-button {
                bottom: 20px;
                right: 20px;
            }

            .wechat-section {
                padding: 35px 20px;
            }

            .wechat-qr-area img,
            .wechat-qr-placeholder {
                width: 150px;
                height: 150px;
            }

            .social-buttons {
                flex-direction: column;
                align-items: center;
            }

            .social-btn {
                width: 100%;
                max-width: 280px;
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <!-- Leaf shadow overlay -->
    <div class="leaf-shadow"></div>

    <!-- Chatbot Button -->
    <button class="chatbot-button" id="chatbotToggle" onclick="toggleChatbot()">💬</button>

    <!-- Chatbot Window -->
    <div class="chatbot-window" id="chatbotWindow">
        <div class="chatbot-header">
            <div>
                <h4 id="chatbotTitle">AUBE 챗봇</h4>
                <div class="chatbot-subtitle" id="chatbotSubtitle">Powered by AI</div>
            </div>
            <button class="chatbot-close" onclick="toggleChatbot()">×</button>
        </div>
        <div class="chatbot-lang-selector">
            <button class="chatbot-lang-btn active" onclick="changeChatLang('ko', this)">한국어</button>
            <button class="chatbot-lang-btn" onclick="changeChatLang('en', this)">English</button>
            <button class="chatbot-lang-btn" onclick="changeChatLang('zh', this)">中文</button>
        </div>
        <div class="chatbot-messages" id="chatbotMessages"></div>
        <div class="chatbot-input-area">
            <input type="text" class="chatbot-input" id="chatbotInput" placeholder="메시지를 입력하세요..."
                onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="chatbot-send" id="chatbotSendBtn" onclick="sendMessage()">전송</button>
        </div>
    </div>

    <!-- Vercel Analytics -->
    <script defer src="/_vercel/insights/script.js"></script>
    <script>
        window.va = window.va || function () {
            (window.vaq = window.vaq || []).push(arguments);
        };
    </script>

    <script>
        /* ============================================================
         *  AUBE — 외국인 고객 응대용 안내 웹앱
         *  Gemini AI 챗봇 + 다국어 지원 + WeChat/Xiaohongshu 연동
         * ============================================================ */

        let chatLang = 'ko';
        let pageLang = 'ko';
        let isSending = false;

        // ──────────────────────────────────────────────
        //  페이지 번역 데이터
        // ──────────────────────────────────────────────
        const pageTranslations = {
            ko: {
                headerTitle: '오브래쉬',
                headerSubtitle: '제주 속눈썹 펌 · 연장 전문 | 눈 뜨자마자 속눈썹이 숲처럼',
                navIntro: '소개',
                navNotice: '안내문',
                navBooking: '예약하기',
                heroTitle: 'JEJU AUBE',
                introTitle: '오브래쉬는 어떤 곳인가요?',
                introText1: '제주 연동 한복판, 연북로 158 2층. 평범한 거리 속 작은 but 감성 가득한 뷰티 공간, 오브래쉬.',

        // ──────────────────────────────────────────────
        //  Gemini AI 챗봇
        // ──────────────────────────────────────────────
        function toggleChatbot() {
            const w = document.getElementById('chatbotWindow');
            w.classList.toggle('open');
            if (w.classList.contains('open') && document.getElementById('chatbotMessages').children.length === 0) {
                initChat();
            }
        }

        function changeChatLang(lang, btnEl) {
            chatLang = lang;
            document.querySelectorAll('.chatbot-lang-btn').forEach(btn => btn.classList.remove('active'));
            btnEl.classList.add('active');
            const ui = chatUI[lang];
            document.getElementById('chatbotTitle').textContent = ui.title;
            document.getElementById('chatbotSubtitle').textContent = ui.subtitle;
            document.getElementById('chatbotInput').placeholder = ui.placeholder;
            document.getElementById('chatbotSendBtn').textContent = ui.send;
            document.getElementById('chatbotMessages').innerHTML = '';
            initChat();
        }

        function initChat() {
            const ui = chatUI[chatLang];
            addBotMessage(ui.welcome);
            
            // Quick action buttons
            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'chatbot-quick-actions';
            ui.quickActions.forEach(action => {
                const btn = document.createElement('button');
                btn.className = 'chatbot-quick-btn';
                btn.textContent = action;
                btn.onclick = () => {
                    sendMessageText(action);
                };
                actionsDiv.appendChild(btn);
            });
            document.getElementById('chatbotMessages').appendChild(actionsDiv);
        }

        function addBotMessage(text) {
            const messagesDiv = document.getElementById('chatbotMessages');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'chatbot-message bot';
            msgDiv.textContent = text;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return msgDiv;
        }

        function addUserMessage(text) {
            const messagesDiv = document.getElementById('chatbotMessages');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'chatbot-message user';
            msgDiv.textContent = text;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addTypingIndicator() {
            const messagesDiv = document.getElementById('chatbotMessages');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'chatbot-message typing';
            msgDiv.id = 'typingIndicator';
            msgDiv.textContent = chatUI[chatLang].typing;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function removeTypingIndicator() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        function collectPageContext() {
            // 현재 페이지의 공지/안내 데이터를 수집하여 Context 생성
            const t = pageTranslations['ko']; // 항상 한국어 원본 데이터 전달
            return JSON.stringify({
                store: aubeContext,
                notices: {
                    etiquette: t.noticeEtiquetteItems,
                    cctv: t.noticeCctvText,
                    wechat: 'WeChat 문의 가능 (QR코드 또는 버튼 사용)'
                }
            });
        }

        async function sendMessageText(text) {
            if (isSending || !text.trim()) return;
            isSending = true;

            addUserMessage(text);
            addTypingIndicator();

            const sendBtn = document.getElementById('chatbotSendBtn');
            sendBtn.disabled = true;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: text,
                        lang: chatLang,
                        context: collectPageContext()
                    })
                });

                removeTypingIndicator();

                if (!response.ok) {
                    throw new Error('API Error');
                }

                const data = await response.json();
                addBotMessage(data.reply || chatUI[chatLang].error);
            } catch (err) {
                removeTypingIndicator();
                addBotMessage(chatUI[chatLang].error);
                console.error('Chatbot error:', err);
            } finally {
                isSending = false;
                sendBtn.disabled = false;
            }
        }

        function sendMessage() {
            const input = document.getElementById('chatbotInput');
            const text = input.value.trim();
            if (text) {
                input.value = '';
                sendMessageText(text);
            }
        }

        // ──────────────────────────────────────────────
        //  Scroll Animations
        // ──────────────────────────────────────────────
        const onScroll = () => {
            document.querySelectorAll('.fade-in').forEach(el => {
                const rect = el.getBoundingClientRect();
                if (rect.top < window.innerHeight - 100) el.classList.add('visible');
            });
        };
        window.addEventListener('scroll', onScroll);
        onScroll();
    </script>
</body>

</html>
