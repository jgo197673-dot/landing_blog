            color: #c48c65;
            background: transparent;
            padding: 5px 18px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'Outfit', sans-serif;
        }

        .hero p {
            font-size: 1.05rem;
            color: #8c7f72;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .card {
            background: #ffffff;
            border: 1px solid #f0e6dc;
            border-radius: 8px;
            padding: 55px 45px;
            margin-bottom: 35px;
            box-shadow: 0 10px 30px rgba(196, 140, 101, 0.02);

            transform: translateY(20px);
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .card:nth-child(3) { animation-delay: 0.1s; }
        .card:nth-child(4) { animation-delay: 0.2s; }
        .card:nth-child(5) { animation-delay: 0.3s; }
        .card:nth-child(6) { animation-delay: 0.4s; }
        .card:nth-child(7) { animation-delay: 0.5s; }

        .card h2 {
            font-family: 'Cormorant Garamond', 'Noto Serif KR', serif;
            font-size: 1.8rem;
            font-weight: 400;
            color: #2e2620;
            margin-bottom: 25px;
            border-bottom: 1px solid #f5ede5;
            padding-bottom: 15px;
            letter-spacing: 0.5px;
            text-align: center;

        .card p {
            font-size: 1.02rem;
            color: #5a5046;
            margin-bottom: 16px;
            line-height: 1.8;
        }

            padding: 0;
            margin: 20px 0;

            color: #5a5046;
            font-size: 1rem;
            position: relative;
            padding-left: 20px;
            border-bottom: 1px dashed #f5ede5;

        }

            position: absolute;

        function render() {
            const c = content[currentLang];
            if (!c) return;

            document.title = c.metaTitle;
            document.documentElement.lang = currentLang;

            document.getElementById('backLink').textContent = c.backLink;
            document.getElementById('heroTitle').textContent = c.hero.title;
            document.getElementById('heroDesc').textContent = c.hero.desc;

            // WeChat (Reservation & WeChat)
            document.getElementById('wechatTitle').textContent = c.wechat.title;
            document.getElementById('wechatDesc').innerHTML = c.wechat.desc.replace(/\n/g, '<br>');
            document.getElementById('wechatQrPlaceholder').innerHTML = c.wechat.qrPlaceholder.replace(/\n/g, '<br>');
            document.getElementById('wechatId').textContent = c.wechat.id;
            document.getElementById('wechatBtnText').textContent = c.wechat.btn;

            // Peaceful Moment
            document.getElementById('peacefulTitle').textContent = c.peaceful.title;
            document.getElementById('peacefulDesc').innerHTML = c.peaceful.desc.replace(/\n/g, '<br>');

            // CCTV Notice
            document.getElementById('cctvTitle').textContent = c.cctv.title;
            document.getElementById('cctvDesc').innerHTML = c.cctv.desc.replace(/\n/g, '<br>');


            // Map
            document.getElementById('mapTitle').textContent = c.map.title;
            document.getElementById('mapAddress').textContent = c.map.address;
            document.getElementById('mapTip').textContent = c.map.tip;
            document.getElementById('mapIframe').title = c.map.title;

            // Visit
            document.getElementById('visitTitle').textContent = c.visit.title;
            const contactInfo = document.getElementById('contactInfo');
            contactInfo.innerHTML = '';
            c.visit.info.forEach(line => {
                const p = document.createElement('p');
                p.innerHTML = line;
                contactInfo.appendChild(p);
            });
            const ctaButtons = document.getElementById('ctaButtons');
            ctaButtons.innerHTML = '';
            c.visit.buttons.forEach(btn => {
                const a = document.createElement('a');
                a.href = btn.href;
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
                let classes = 'btn';
                if (btn.outline) classes += ' btn-outline';
                if (btn.class) classes += ' ' + btn.class;
                a.className = classes;
                a.textContent = btn.text;
                ctaButtons.appendChild(a);
            });
        }

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
            });
            render();
        }

        function initMap() {
            const googleMapUrl = 'https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d699.5762148814902!2d126.49757394172545!3d33.481493331398944!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x350cfb37fe39ee5d%3A0x9e9ad05f8010acce!2z7Jik67iM656Y7IucIGF1YmVsYXNo!5e0!3m2!1sko!2skr!4v1764471501764!5m2!1sko!2skr';
            document.getElementById('mapIframe').src = googleMapUrl;
        }

        render();
        initMap();
    </script>
</body>

</html>
