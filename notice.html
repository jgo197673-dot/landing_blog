            padding: 60px 20px;
            position: relative;
        }

        .lang-selector-top {

            top: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
        }

        .lang-btn {
            padding: 8px 16px;
            border: 1px solid #d6a77a;
            background: #fff;
            color: #d6a77a;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .lang-btn:hover {
            background: #f9f4ef;
        }

        .lang-btn.active {
            background: #d6a77a;
            color: #fff;
        }

        .hero {
            text-align: center;
            margin-bottom: 50px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .hero .page-label {
            display: inline-block;
            background: linear-gradient(135deg, #c48c65, #d6a77a);
            color: #fff;
            padding: 6px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .hero p {
            font-size: 1.05rem;
            color: #666;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease forwards;
        }

        .card:nth-child(3) { animation-delay: 0.1s; }
        .card:nth-child(4) { animation-delay: 0.2s; }
        .card:nth-child(5) { animation-delay: 0.3s; }
        .card:nth-child(6) { animation-delay: 0.4s; }
        .card:nth-child(7) { animation-delay: 0.5s; }

        .card h2 {
            font-size: 1.6rem;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card h2 .card-icon {
            font-size: 1.5rem;
        }

        .card p {
            font-size: 1.02rem;
            color: #555;
            margin-bottom: 16px;
            line-height: 1.8;
        }

        .card ul {
            list-style: none;
            padding: 0;
            margin: 16px 0;
        }

        .card ul li {
            padding: 10px 0;
            color: #555;
            font-size: 1.02rem;
            position: relative;
            padding-left: 25px;
        }

        .card ul li::before {
            content: "•";
            color: #d6a77a;
            font-weight: bold;
            font-size: 1.5rem;
            position: absolute;
            left: 0;
            top: 5px;
        }

        .wechat-area {
            text-align: center;
            padding: 30px 0;
        }

        .wechat-qr-box {
            display: inline-block;
            background: #fffaf5;
            border: 2px dashed #e0d0c0;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .wechat-qr-box img {
            width: 180px;
            height: 180px;
            display: block;
            border-radius: 8px;
        }

        .wechat-qr-placeholder {
            width: 180px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f0ea;
            border-radius: 8px;
            color: #b0956e;
            font-size: 0.85rem;
            text-align: center;
            line-height: 1.4;
        }

        .wechat-id {
            font-size: 0.9rem;
            color: #999;
            margin-top: 8px;
        }

        .wechat-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 30px;
            background: #07c160;
            color: #fff;
            border-radius: 30px;
            border: none;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;

        .wechat-btn:hover {
            background: #06ad56;
            transform: translateY(-2px);

            border-radius: 12px;

            align-items: flex-start;
            gap: 10px;
            margin: 8px 0;

            min-width: 28px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #c48c65;
            padding-top: 3px;

        .multilang-block .lang-text {

            color: #555;
            line-height: 1.6;

            border: 1px solid #e8e4de;
        }

        .map-container iframe {

            height: 400px;
            border: none;
        }

            display: flex;
            gap: 15px;
            margin-top: 25px;
            flex-wrap: wrap;

        .btn {

            background: #d6a77a;
            color: #fff;
            padding: 14px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.3s, transform 0.3s;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-family: inherit;
        }

        .btn:hover {
            background: #c49666;
            transform: translateY(-2px);

        .btn-outline {
            background: transparent;
            border: 2px solid #d6a77a;
            color: #d6a77a;
        }

            background: #d6a77a;
            color: #fff;

                },

                    tip: '💡 距离莲洞中央站步行3分钟，楼前公共停车场首小时免费'
                },
                visit: {
                    title: '访问与预约 📍',
                    info: [
                        '<strong>地址</strong>: 济州市莲北路158号2楼',
                        '<strong>预约</strong>: <a href="tel:050-7135-50623" style="color:#d6a77a;text-decoration:none;">050-7135-50623</a>',

                        { text: '打开 Naver 地图', href: 'https://map.naver.com/v5/search/%EC%A0%9C%EC%A3%BC%20%EC%A0%9C%EC%A3%BC%EC%8B%9C%20%EC%97%B0%EB%8F%99%20%EC%97%B0%EB%B6%81%EB%A1%9C%20158', outline: true }

        };

        function render() {
            const c = content[currentLang];
            if (!c) return;

            document.title = c.metaTitle;
            document.documentElement.lang = currentLang;

            document.getElementById('backLink').textContent = c.backLink;
            document.getElementById('heroTitle').textContent = c.hero.title;
            document.getElementById('heroDesc').textContent = c.hero.desc;

            // WeChat
            document.getElementById('wechatTitle').textContent = c.wechat.title;
            document.getElementById('wechatDesc').textContent = c.wechat.desc;
            document.getElementById('wechatQrPlaceholder').innerHTML = c.wechat.qrPlaceholder.replace('\n', '<br>');
            document.getElementById('wechatId').textContent = c.wechat.id;
            document.getElementById('wechatBtnText').textContent = c.wechat.btn;

            // Etiquette
            document.getElementById('etiquetteTitle').textContent = c.etiquette.title;
            document.getElementById('etiquetteDesc').textContent = c.etiquette.desc;
            const etiquetteList = document.getElementById('etiquetteList');
            etiquetteList.innerHTML = '';
            c.etiquette.items.forEach(item => {
                const li = document.createElement('li');
                li.textContent = item;
                etiquetteList.appendChild(li);
            });
            const etiquetteMultilang = document.getElementById('etiquetteMultilang');
            etiquetteMultilang.innerHTML = '';
            c.etiquette.multilang.forEach(row => {
                const div = document.createElement('div');
                div.className = 'lang-row';
                div.innerHTML = `<span class="lang-tag">${row.lang}</span><span class="lang-text">${row.text}</span>`;
                etiquetteMultilang.appendChild(div);
            });

            // CCTV
            document.getElementById('cctvTitle').textContent = c.cctv.title;
            document.getElementById('cctvText').textContent = c.cctv.text;
            const cctvMultilang = document.getElementById('cctvMultilang');
            cctvMultilang.innerHTML = '';
            c.cctv.multilang.forEach(row => {
                const div = document.createElement('div');
                div.className = 'lang-row';
                div.innerHTML = `<span class="lang-tag">${row.lang}</span><span class="lang-text">${row.text}</span>`;
                cctvMultilang.appendChild(div);
            });

            // About
            document.getElementById('aboutTitle').textContent = c.about.title;
            document.getElementById('aboutDesc').textContent = c.about.desc;
            const aboutList = document.getElementById('aboutList');
            aboutList.innerHTML = '';
            c.about.list.forEach(item => {
                const li = document.createElement('li');
                li.textContent = item;
                aboutList.appendChild(li);
            });

            // Map
            document.getElementById('mapTitle').textContent = c.map.title;
            document.getElementById('mapAddress').textContent = c.map.address;
            document.getElementById('mapTip').textContent = c.map.tip;
            document.getElementById('mapIframe').title = c.map.title;

            // Visit
            document.getElementById('visitTitle').textContent = c.visit.title;
            const contactInfo = document.getElementById('contactInfo');
            contactInfo.innerHTML = '';
            c.visit.info.forEach(line => {
                const p = document.createElement('p');
                p.innerHTML = line;
                contactInfo.appendChild(p);
            });
            const ctaButtons = document.getElementById('ctaButtons');
            ctaButtons.innerHTML = '';
            c.visit.buttons.forEach(btn => {
                const a = document.createElement('a');
                a.href = btn.href;
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
                let classes = 'btn';
                if (btn.outline) classes += ' btn-outline';
                if (btn.class) classes += ' ' + btn.class;
                a.className = classes;
                a.textContent = btn.text;
                ctaButtons.appendChild(a);
            });
        }

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
            });
            render();
        }

        function initMap() {
            const googleMapUrl = 'https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d699.5762148814902!2d126.49757394172545!3d33.481493331398944!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x350cfb37fe39ee5d%3A0x9e9ad05f8010acce!2z7Jik67iM656Y7IucIGF1YmVsYXNo!5e0!3m2!1sko!2skr!4v1764471501764!5m2!1sko!2skr';
            document.getElementById('mapIframe').src = googleMapUrl;
        }

        render();
        initMap();
    </script>
</body>

</html>
